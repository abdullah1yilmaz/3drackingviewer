<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Racking Systems — 3D Catalog</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAEBE7;
    --paper-2:#E1E3DD;
    --line:#CFD2CB;
    --line-strong:#B7BBB2;
    --ink:#15181B;
    --steel:#5C636B;
    --stage:#F4F5F2;
    --stage-line:#C9CCC6;
    --accent:#FFC400;
    --accent-deep:#E0A800;
    --display:'Archivo', sans-serif;
    --mono:'Space Mono', monospace;
    --body:'Inter', sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}

  body{
    font-family:var(--body);color:var(--ink);background-color:var(--paper);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:40px 40px;background-position:-1px -1px;
    line-height:1.5;-webkit-font-smoothing:antialiased;
  }

  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  header{border-bottom:1.5px solid var(--ink);background:rgba(234,235,231,.85);backdrop-filter:blur(4px);position:sticky;top:0;z-index:20}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;max-width:1180px;margin:0 auto}
  .wordmark{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.04em;display:flex;align-items:center;gap:9px}
  .wordmark .glyph{width:13px;height:13px;background:var(--ink);position:relative;flex:none}
  .wordmark .glyph::after{content:"";position:absolute;right:0;top:0;width:6px;height:13px;background:var(--accent)}
  .topbar .meta{font-family:var(--mono);font-size:11px;color:var(--steel);letter-spacing:.04em}

  .hero{padding:54px 0 40px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--steel);display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .eyebrow::before{content:"";width:34px;height:8px;background:var(--accent);flex:none}
  h1{font-family:var(--display);font-weight:800;letter-spacing:-.02em;font-size:clamp(36px,6.4vw,76px);line-height:.98;max-width:14ch}
  h1 em{font-style:normal;color:var(--steel)}
  .lede{margin-top:20px;max-width:52ch;font-size:16.5px;color:#33383E}
  .lede b{font-weight:500;color:var(--ink)}
  .rule{height:1.5px;background:var(--ink);margin-top:34px;position:relative}
  .rule::before,.rule::after{content:"";position:absolute;top:-5px;width:1.5px;height:12px;background:var(--ink)}
  .rule::before{left:0}.rule::after{right:0}

  .gallery{padding:8px 0 60px;display:flex;flex-direction:column;gap:42px}

  .bay{border:1.5px solid var(--ink);background:var(--paper)}
  .bay-head{display:flex;align-items:baseline;gap:16px;padding:16px 22px;border-bottom:1.5px solid var(--ink);flex-wrap:wrap}
  .bay-head .ref{font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--accent-deep);font-weight:700}
  .bay-head h2{font-family:var(--display);font-weight:800;font-size:clamp(20px,2.6vw,28px);letter-spacing:-.02em}
  .bay-head .tagline{font-family:var(--mono);font-size:11px;color:var(--steel);letter-spacing:.04em;margin-left:auto}

  .stage{position:relative;background:radial-gradient(circle at 50% 36%, #FFFFFF 0%, #ECEDE9 100%);aspect-ratio:16/9;width:100%;overflow:hidden}
  model-viewer{width:100%;height:100%;background:transparent}

  .tick{position:absolute;width:18px;height:18px;pointer-events:none;z-index:3}
  .tick::before,.tick::after{content:"";position:absolute;background:var(--ink)}
  .tick::before{width:18px;height:1.5px}.tick::after{width:1.5px;height:18px}
  .tick.tl{top:14px;left:14px}.tick.tr{top:14px;right:14px}
  .tick.tr::before{right:0}.tick.tr::after{right:0}
  .tick.bl{bottom:14px;left:14px}.tick.bl::before{bottom:0}.tick.bl::after{bottom:0}
  .tick.br{bottom:14px;right:14px}.tick.br::before{bottom:0;right:0}.tick.br::after{bottom:0;right:0}

  .stage-tag{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:3;font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;color:var(--steel);text-transform:uppercase;pointer-events:none}
  .progress{position:absolute;left:0;bottom:0;height:3px;width:0;background:var(--accent);z-index:4;transition:width .2s ease}
  .progress.done{opacity:0;transition:opacity .4s ease .1s}
  .hint{position:absolute;bottom:16px;left:16px;z-index:3;font-family:var(--mono);font-size:10.5px;color:var(--steel);letter-spacing:.05em}

  .controls{position:absolute;bottom:14px;right:14px;z-index:3;display:flex;gap:8px}
  .ctl{width:38px;height:38px;border:1px solid var(--line-strong);background:rgba(255,255,255,.85);color:var(--ink);display:grid;place-items:center;cursor:pointer;transition:border-color .15s,color .15s,background .15s}
  .ctl:hover{border-color:var(--accent-deep);color:var(--accent-deep);background:#fff}
  .ctl svg{width:17px;height:17px;display:block}
  .ctl[hidden]{display:none}

  .specs{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1.5px solid var(--ink)}
  .spec{padding:16px 18px;border-right:1px solid var(--line-strong)}
  .spec:last-child{border-right:0}
  .spec .k{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--steel)}
  .spec .v{font-family:var(--display);font-weight:600;font-size:15px;margin-top:7px;letter-spacing:-.01em;line-height:1.25}

  .desc{padding:22px 26px 26px;max-width:78ch;font-size:15.5px;color:#33383E}

  footer{border-top:1.5px solid var(--ink);padding:26px 0 60px;font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--steel);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}

  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px}

  @media (max-width:780px){
    body{background-size:32px 32px}
    .bay-head .tagline{margin-left:0;flex-basis:100%}
    .specs{grid-template-columns:repeat(2,1fr)}
    .spec:nth-child(2){border-right:0}
    .spec:nth-child(1),.spec:nth-child(2){border-bottom:1px solid var(--line-strong)}
    .stage{aspect-ratio:4/3}
  }
  @media (prefers-reduced-motion:reduce){*{scroll-behavior:auto}.progress{transition:none}}
</style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="wordmark"><span class="glyph"></span>STORAGE&nbsp;SYSTEMS</div>
    <div class="meta">CAT — 3D / REV 01</div>
  </div>
</header>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Interactive Catalog</div>
    <h1>Every racking system, <em>up close.</em></h1>
    <p class="lede"><b>Rotate, zoom and inspect</b> each storage configuration in three dimensions. Drag any model to orbit it, scroll to zoom, and read the spec sheet beneath.</p>
    <div class="rule"></div>
  </section>

  <main class="gallery" id="gallery"></main>
</div>

<div class="wrap">
  <footer>
    <span>STORAGE SYSTEMS — RACKING CATALOG</span>
    <span>RENDERED VIA glTF / WEBGL</span>
  </footer>
</div>

<script>
  const SYSTEMS = [
    {
      ref:"REF.01",
      name:"Pallet Shuttle System",
      src:"models/pallet-shuttle.glb",
      tagline:"SEMI-AUTOMATED · DEEP-LANE",
      specs:{ Density:"Very high", Rotation:"FIFO / LIFO", Access:"Motorised shuttle", "Best for":"High-throughput SKUs" },
      desc:"A motorised shuttle runs inside the storage channels, carrying pallets to and from the load face so forklifts never enter the lane. Deep-lane storage with fast, repeatable cycles, fewer manoeuvres and less handling damage — well suited to high volumes of the same product."
    },
    {
      ref:"REF.02",
      name:"Drive-In Racking",
      src:"models/gravityanimated.glb",
      tagline:"COMPACT · LOW SELECTIVITY",
      specs:{ Density:"High", Rotation:"LIFO (drive-in)", Access:"Forklift enters lane", "Best for":"Few SKUs, large volumes" },
      desc:"Forklifts drive directly into the lane and stack pallets onto continuous support rails. By removing the aisle between every bay, the floor plate is packed tightly — the go-to choice where the SKU count is low, quantity per SKU is high, and cold-storage volume matters."
    },
    {
      ref:"REF.03",
      name:"Gravity (Live) Racking",
      src:"models/gravity.glb",
      tagline:"GRAVITY-FED · STRICT FIFO",
      specs:{ Density:"High", Rotation:"FIFO (strict)", Access:"Load rear / pick front", "Best for":"Date-sensitive, high rotation" },
      desc:"Pallets sit on slightly inclined roller lanes and travel by gravity from the loading side through to the picking side. The result is guaranteed first-in, first-out flow with compact, aisle-light storage — ideal for perishable or date-controlled stock."
    },
    {
      ref:"REF.04",
      name:"Rack-Clad Warehouse",
      src:"models/rackclad.glb",
      tagline:"RACK-SUPPORTED · HIGH-BAY",
      specs:{ Density:"Maximum (vertical)", Rotation:"System-dependent", Access:"Often automated (AS/RS)", "Best for":"Tall, land-constrained sites" },
      desc:"Here the racking is the building. The uprights carry the roof and wall cladding directly, removing the need for a separate structural frame and letting the warehouse climb far higher — the standard approach for tall, automated high-bay facilities."
    }
  ];

  const PLAY = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg>';
  const PAUSE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="5" width="3.5" height="14"/><rect x="14.5" y="5" width="3.5" height="14"/></svg>';
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const gallery = document.getElementById('gallery');

  SYSTEMS.forEach(s=>{
    const specRows = Object.entries(s.specs)
      .map(([k,v])=>'<div class="spec"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>').join('');

    const bay = document.createElement('section');
    bay.className='bay';
    bay.innerHTML =
      '<div class="bay-head">'+
        '<span class="ref">'+s.ref+'</span>'+
        '<h2>'+s.name+'</h2>'+
        '<span class="tagline">'+s.tagline+'</span>'+
      '</div>'+
      '<div class="stage">'+
        '<span class="tick tl"></span><span class="tick tr"></span>'+
        '<span class="tick bl"></span><span class="tick br"></span>'+
        '<span class="stage-tag">'+s.ref+' — '+s.name.toUpperCase()+'</span>'+
        '<model-viewer src="'+s.src+'" alt="'+s.name+' 3D model" camera-controls '+(reduced?'':'auto-rotate')+' autoplay loading="lazy" shadow-intensity="1" exposure="1.05" environment-image="neutral" interaction-prompt="none" touch-action="pan-y" ar ar-modes="webxr scene-viewer quick-look"></model-viewer>'+
        '<div class="progress"></div>'+
        '<div class="hint">DRAG&nbsp;·&nbsp;ROTATE&nbsp;&nbsp;/&nbsp;&nbsp;SCROLL&nbsp;·&nbsp;ZOOM</div>'+
        '<div class="controls">'+
          '<button class="ctl btn-rotate" title="Pause / resume rotation" aria-label="Pause or resume rotation">'+(reduced?PLAY:PAUSE)+'</button>'+
          '<button class="ctl btn-reset" title="Reset view" aria-label="Reset camera view"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12a8 8 0 1 1 2.3 5.6"/><path d="M4 18v-4h4"/></svg></button>'+
          '<button class="ctl btn-ar" title="View in your space (AR)" aria-label="View in augmented reality" hidden><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3 4 7v10l8 4 8-4V7l-8-4z"/><path d="M4 7l8 4 8-4M12 11v10"/></svg></button>'+
          '<button class="ctl btn-full" title="Fullscreen" aria-label="Toggle fullscreen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>'+
        '</div>'+
      '</div>'+
      '<div class="specs">'+specRows+'</div>'+
      '<p class="desc">'+s.desc+'</p>';
    gallery.appendChild(bay);

    const stage    = bay.querySelector('.stage');
    const viewer   = bay.querySelector('model-viewer');
    const progress = bay.querySelector('.progress');
    const btnRot   = bay.querySelector('.btn-rotate');
    const btnAR    = bay.querySelector('.btn-ar');

    viewer.addEventListener('progress', e=>{
      const p = Math.round(e.detail.totalProgress*100);
      progress.style.width = p+'%';
      if(p>=100) progress.classList.add('done');
    });

    viewer.addEventListener('load', ()=>{ if(viewer.canActivateAR) btnAR.hidden=false; });

    btnRot.addEventListener('click', ()=>{
      if(viewer.hasAttribute('auto-rotate')){ viewer.removeAttribute('auto-rotate'); btnRot.innerHTML=PLAY; }
      else { viewer.setAttribute('auto-rotate',''); btnRot.innerHTML=PAUSE; }
    });

    bay.querySelector('.btn-reset').addEventListener('click', ()=>{
      viewer.cameraOrbit='auto auto auto';
      viewer.cameraTarget='auto auto auto';
      viewer.fieldOfView='auto';
      viewer.jumpCameraToGoal && viewer.jumpCameraToGoal();
    });

    bay.querySelector('.btn-full').addEventListener('click', ()=>{
      if(!document.fullscreenElement) stage.requestFullscreen && stage.requestFullscreen();
      else document.exitFullscreen && document.exitFullscreen();
    });

    btnAR.addEventListener('click', ()=> viewer.activateAR && viewer.activateAR());
  });
</script>
</body>
</html>
